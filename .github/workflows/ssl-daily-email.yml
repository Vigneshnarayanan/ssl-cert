name: Daily SSL Notification

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  ssl-notification:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate self-signed SSL certificate
        run: |
          mkdir ssl
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
          -keyout ssl/ssl-lab.key \
          -out ssl/ssl-lab.crt \
          -subj "/CN=ssl-lab.local/O=VigLab/C=AU"

      - name: List SSL files
        run: ls -l ssl/

      - name: Upload SSL certificate artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssl-cert
          path: ssl/*

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "SSL certificate generated successfully"
          body: |
            The SSL certificate for ssl-lab.local was generated successfully.

            Certificate expiry:
            $(openssl x509 -in ssl/ssl-lab.crt -noout -enddate)
          to: ${{ secrets.SMTP_USER }}
          from: ${{ secrets.SMTP_USER }}
